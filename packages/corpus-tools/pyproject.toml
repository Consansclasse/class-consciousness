[project]
name = "cc-corpus"
version = "0.0.1"
description = "CLI for ingesting Marxist texts into the class-consciousness archive."
requires-python = ">=3.12"
license = { text = "AGPL-3.0-or-later" }
dependencies = [
    "typer>=0.12",
    "lxml>=5.3",
    "httpx>=0.27",
    "pydantic>=2.9",
    "structlog>=24.4",
    "tiktoken>=0.8",
    "rich>=13.9",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "lxml-stubs>=0.5",
]

[project.scripts]
cc-corpus = "cc_corpus.cli:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/cc_corpus"]
