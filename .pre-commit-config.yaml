repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: mypy
        name: mypy (uv-managed env, voit les types des deps)
        entry: uv run mypy
        language: system
        types: [python]
        files: ^(apps/api|packages/corpus-tools)/src
        require_serial: true
        pass_filenames: false
        args: [apps/api/src, packages/corpus-tools/src]

  - repo: https://github.com/biomejs/pre-commit
    rev: v1.9.0
    hooks:
      - id: biome-check

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.0
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: dco-signoff
        name: DCO signoff present
        entry: scripts/check-dco.sh
        language: script
        stages: [commit-msg]
