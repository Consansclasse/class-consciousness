name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - run: uv sync --all-packages --all-extras
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy apps/api/src packages/corpus-tools/src
      - name: Run pytest with coverage
        run: uv run pytest --cov=apps/api/src --cov=packages/corpus-tools/src --cov-fail-under=70

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build

  e2e:
    runs-on: ubuntu-latest
    needs: [python, node]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.12
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: uv sync --all-packages
      - run: pnpm install
      - name: Start dev stack
        run: docker compose -f infra/docker-compose.yml up -d --wait
      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8000/health && exit 0
            sleep 2
          done
          echo "API never became healthy"; exit 1
      - name: Apply Alembic migrations inside API container
        run: docker compose -f infra/docker-compose.yml exec -T api uv run alembic -c apps/api/alembic.ini upgrade head
      - name: Install Playwright browsers
        working-directory: apps/web
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E suite
        working-directory: apps/web
        env:
          PUBLIC_API_BASE_URL: http://localhost:8000
        run: pnpm exec playwright test
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            apps/web/playwright-report/
            apps/web/test-results/
          retention-days: 7
      - name: Tail docker logs on failure
        if: failure()
        run: docker compose -f infra/docker-compose.yml logs --tail=200

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: osv-scanner
        uses: google/osv-scanner-action@v1.9.1
        with:
          scan-args: |-
            --recursive
            --skip-git
            ./

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker buildx build --target=prod -f infra/Dockerfile.api .
      - run: docker buildx build --target=prod -f infra/Dockerfile.web .
