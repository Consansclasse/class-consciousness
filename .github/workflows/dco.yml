name: DCO

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - name: Verify Signed-off-by on every commit
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        shell: bash
        run: |
          set -euo pipefail
          missing=()
          while read -r sha; do
            [ -z "$sha" ] && continue
            if ! git log -1 --format=%B "$sha" | grep -qE '^Signed-off-by: '; then
              missing+=("$sha $(git log -1 --format=%s "$sha")")
            fi
          done < <(git log --no-merges --format=%H "$BASE..$HEAD")

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::error::Commits sans Signed-off-by (DCO requis) :"
            printf '  - %s\n' "${missing[@]}"
            echo
            echo "Pour corriger : git rebase --signoff $BASE && git push --force-with-lease"
            exit 1
          fi
          echo "✓ Tous les commits sont signés DCO."
