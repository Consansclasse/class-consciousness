version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/apps/api"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5

  - package-ecosystem: "pip"
    directory: "/packages/corpus-tools"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5

  - package-ecosystem: "docker"
    directory: "/infra"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
