name: class-consciousness-dev

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    logging: *default-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-class_consciousness}
    # Remap host 5433 → container 5432 pour cohabiter avec un pg système sur 5432.
    ports: ["127.0.0.1:5433:5432"]
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cc}"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD-SHELL", "exit 0"]
      interval: 10s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *default-logging
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    # Remap host 6380 → container 6379 pour cohabiter avec un Redis système sur 6379.
    ports: ["127.0.0.1:6380:6379"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
      target: dev
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - path: ../.env
        required: false
    environment:
      # Override des vars .env : à l'intérieur du réseau docker, on parle au
      # service "postgres" sur son port interne 5432, indépendamment du mapping
      # host (5433) défini pour cohabiter avec un pg système.
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      qdrant: { condition: service_started }
      redis: { condition: service_healthy }
    volumes:
      - ../apps/api:/app/apps/api
      - ../packages/corpus-tools:/app/packages/corpus-tools

  web:
    build:
      context: ..
      dockerfile: infra/Dockerfile.web
      target: dev
    restart: unless-stopped
    logging: *default-logging
    env_file:
      - path: ../.env
        required: false
    # Remap host 3001 → container 3000 pour cohabiter avec un autre service sur 3000.
    ports: ["127.0.0.1:3001:3000"]
    depends_on:
      - api
    volumes:
      - ../apps/web:/app/apps/web

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
      - web

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  caddy_data:
  caddy_config:
