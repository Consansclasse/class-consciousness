# Project Coolify séparé : matomo. Voir docs/adr/0007-analytics-matomo.md
# et ops/runbooks/matomo-deploy.md.
#
# Contraintes Coolify (idem compose principal) :
# - aucune section `networks:`
# - pas de `ports:` (Traefik interne Coolify route via SERVICE_FQDN_*)
# - magic vars `SERVICE_PASSWORD_*` pour secrets, `SERVICE_FQDN_*_<port>` pour FQDN
name: matomo

services:
  matomo:
    image: matomo:5.10-apache
    environment:
      SERVICE_FQDN_MATOMO_80: analytics.consciencedeclasse.com
      MATOMO_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: ${SERVICE_PASSWORD_MATOMO_DB}
      MATOMO_DATABASE_DBNAME: matomo
      PHP_MEMORY_LIMIT: 512M
    volumes:
      - matomo_data:/var/www/html
    depends_on:
      matomo-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/matomo.php >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  matomo-db:
    image: mariadb:lts
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb-buffer-pool-size=512M
      - --innodb-flush-log-at-trx-commit=2
    environment:
      MARIADB_ROOT_PASSWORD: ${SERVICE_PASSWORD_MATOMO_DB_ROOT}
      MARIADB_DATABASE: matomo
      MARIADB_USER: matomo
      MARIADB_PASSWORD: ${SERVICE_PASSWORD_MATOMO_DB}
    volumes:
      - matomo_db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  matomo-cron:
    image: matomo:5.10-apache
    entrypoint: ["sh", "-c"]
    command:
      - 'while true; do sleep 3600; php /var/www/html/console core:archive --url=https://analytics.consciencedeclasse.com/ || true; done'
    volumes:
      - matomo_data:/var/www/html
    environment:
      MATOMO_DATABASE_HOST: matomo-db
      MATOMO_DATABASE_USERNAME: matomo
      MATOMO_DATABASE_PASSWORD: ${SERVICE_PASSWORD_MATOMO_DB}
      MATOMO_DATABASE_DBNAME: matomo
    depends_on:
      matomo:
        condition: service_healthy
    restart: unless-stopped

volumes:
  matomo_data:
  matomo_db:
